on:
  workflow_dispatch: 

jobs:
  FlakeHubContext:
    runs-on: "self-hosted"
    permissions:
      id-token: "write"
    steps:
      - run: |
          curl -fsSL "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=give-me-a-token" -H "Authorization: Bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" | jq -r .value | awk -F. '{print $2}' | base64 -d 2>/dev/null | jq -r '.iss, .repository_owner_id'
